<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>포토 리뷰 - QuietSkin</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main class="inner_section">
        <h2 style="font-size:36px; font-weight:700; margin-bottom:20px; color:#1a4d38;">Photo Reviews</h2>
        <p style="color:#666; margin-bottom:40px;">실제 민감성 피부 사용자들이 직접 올린 정직한 전후 변화 갤러리</p>
        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:20px;">
            <div style="background:#f4f6f4; aspect-ratio:1/1; border-radius:8px; padding:20px; display:flex; align-items:flex-end;"><strong>"홍조가 완전히 가라앉았어요"</strong></div>
            <div style="background:#f4f6f4; aspect-ratio:1/1; border-radius:8px; padding:20px; display:flex; align-items:flex-end;"><strong>"가벼운데 정말 촉촉합니다."</strong></div>
            <div style="background:#f4f6f4; aspect-ratio:1/1; border-radius:8px; padding:20px; display:flex; align-items:flex-end;"><strong>"트러블 유발 전혀 없네요."</strong></div>
        </div>
    </main>
</body>
</html>
