<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 결과 - QuietSkin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/sub.css">
    <link rel="stylesheet" href="./css/search.css">
</head>
<body>
    <div data-include="header"></div>

    <main class="sr-page">

        <!-- 검색 헤더 -->
        <div class="sr-header">
            <div class="sr-header-inner">
                <span class="sr-kicker">Search Results</span>
                <h1 class="sr-title" id="sr-title">
                    "<em id="sr-keyword"></em>" 검색 결과
                </h1>
                <p class="sr-count" id="sr-count"></p>
            </div>
            <div class="sr-search-bar">
                <form class="sr-search-wrap" id="sr-form">
                    <span class="material-icons" aria-hidden="true">search</span>
                    <input type="search" class="sr-input" id="sr-input"
                        placeholder="다시 검색해보세요" autocomplete="off" aria-label="검색어 입력">
                    <button type="submit" class="sr-submit">검색</button>
                </form>
            </div>
        </div>

        <div class="sr-body">

            <!-- 탭 -->
            <div class="sr-tabs" role="tablist">
                <button class="sr-tab active" role="tab" data-tab="products">제품<span class="sr-tab-badge" id="badge-products">0</span>
                </button>
                <button class="sr-tab" role="tab" data-tab="content">콘텐츠<span class="sr-tab-badge" id="badge-content">0</span>
                </button>
            </div>

            <!-- 제품 패널 -->
            <div class="sr-panel active" id="panel-products">
                <div class="sr-product-grid" id="product-grid"></div>
                <div class="sr-empty" id="empty-products" style="display:none">
                    <span class="material-icons">search_off</span>
                    <strong>일치하는 제품이 없어요</strong>
                    <p>검색어를 바꾸거나 아래 추천 검색어를 눌러보세요.</p>
                    <div class="sr-empty-btns">
                        <a href="./index.html" class="sr-empty-btn primary">홈으로</a>
                        <a href="./sub_all_products.html" class="sr-empty-btn secondary">전체 상품 보기</a>
                    </div>
                </div>
            </div>

            <!-- 콘텐츠 패널 -->
            <div class="sr-panel" id="panel-content">
                <div class="sr-content-list" id="content-list"></div>
                <div class="sr-empty" id="empty-content" style="display:none">
                    <span class="material-icons">search_off</span>
                    <strong>일치하는 콘텐츠가 없어요</strong>
                    <p>검색어를 바꾸거나 아래 추천 검색어를 눌러보세요.</p>
                    <div class="sr-empty-btns">
                        <a href="./index.html" class="sr-empty-btn primary">홈으로</a>
                        <a href="./sub_all_products.html" class="sr-empty-btn secondary">전체 상품 보기</a>
                    </div>
                </div>
            </div>

            <!-- 추천 검색어 -->
            <div class="sr-suggest">
                <span class="sr-suggest-label">추천 검색어</span>
                <div class="sr-suggest-tags">
                    <a href="search.html?q=진정+앰플">진정 앰플</a>
                    <a href="search.html?q=병풀">병풀</a>
                    <a href="search.html?q=민감성+토너">민감성 토너</a>
                    <a href="search.html?q=수분+크림">수분 크림</a>
                    <a href="search.html?q=루틴+세트">루틴 세트</a>
                    <a href="search.html?q=히알루론산">히알루론산</a>
                </div>
            </div>

        </div>
    </main>

    <div data-include="footer"></div>
    <script src="./js/script.js"></script>
    <script src="./js/search.js"></script>
</body>
</html>
